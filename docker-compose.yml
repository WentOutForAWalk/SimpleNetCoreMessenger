version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=qwerty123
      - POSTGRES_DB=my_project_db
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql 

volumes:
  postgres_data:
