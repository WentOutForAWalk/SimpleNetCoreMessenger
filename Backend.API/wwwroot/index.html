<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>◉ VOID MESSENGER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-hover: #1e1e1e;
            --bg-active: #252525;
            --metal-1: #1c1c1e;
            --metal-2: #2c2c2e;
            --metal-3: #3a3a3c;
            --metal-shine: #4a4a4c;
            --text-primary: #e5e5e5;
            --text-secondary: #8e8e93;
            --text-muted: #555555;
            --accent: #ffffff;
            --border: #222222;
            --border-light: #2e2e2e;
            --danger: #ff3b30;
            --danger-dim: rgba(255,59,48,0.12);
            --shadow: rgba(0,0,0,0.8);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--metal-3);
            border-radius: 3px;
        }

        /* ==================== LOGIN ==================== */
        #loginScreen {
            position: fixed;
            inset: 0;
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }

            #loginScreen::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.02) 0%, transparent 70%);
                pointer-events: none;
            }

        .login-box {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 360px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 36px 28px;
            box-shadow: 0 20px 60px var(--shadow);
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .login-logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            animation: pulse-dot 3s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 10px rgba(255,255,255,0.3);
            }

            50% {
                opacity: 0.4;
                box-shadow: 0 0 4px rgba(255,255,255,0.1);
            }
        }

        .login-logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--accent);
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 24px;
            background: var(--metal-1);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .login-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: none;
            background: none;
        }

            .login-tab.active {
                background: var(--accent);
                color: var(--bg-primary);
            }

        .login-field {
            margin-bottom: 14px;
        }

            .login-field label {
                display: block;
                font-size: 10px;
                font-weight: 600;
                color: var(--text-secondary);
                margin-bottom: 6px;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                font-family: 'Space Grotesk', sans-serif;
            }

        .login-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--metal-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

            .login-input:focus {
                border-color: var(--metal-shine);
            }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 6px;
        }

            .login-btn:hover {
                background: #d0d0d0;
            }

            .login-btn:active {
                transform: scale(0.98);
            }

            .login-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
                transform: none;
            }

        .login-error {
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            min-height: 16px;
        }

        .spinner-s {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ==================== APP LAYOUT ==================== */
        #appScreen {
            display: none;
            width: 100%;
            height: 100%;
        }

        .app-wrap {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px 16px 14px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,255,255,0.25);
            animation: pulse-dot 3s ease-in-out infinite;
        }

        .user-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--metal-1);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            position: relative;
        }

            .user-btn:hover {
                border-color: var(--metal-3);
                color: var(--text-primary);
            }

        .user-drop {
            display: none;
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 4px;
            min-width: 170px;
            box-shadow: 0 12px 40px var(--shadow);
            z-index: 200;
        }

            .user-drop.show {
                display: block;
            }

        .user-drop-name {
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        .user-drop-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: none;
            color: var(--text-primary);
            width: 100%;
            font-family: 'Inter', sans-serif;
            transition: background 0.1s;
        }

            .user-drop-item:hover {
                background: var(--bg-hover);
            }

            .user-drop-item.danger {
                color: var(--danger);
            }

                .user-drop-item.danger:hover {
                    background: var(--danger-dim);
                }

        .btn-new-ch {
            width: 100%;
            padding: 9px 14px;
            background: var(--metal-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .btn-new-ch:hover {
                background: var(--metal-2);
                color: var(--text-primary);
            }

            .btn-new-ch .p-icon {
                font-size: 16px;
                font-weight: 300;
            }

        .ch-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .ch-item {
            padding: 10px 12px;
            margin-bottom: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            border: 1px solid transparent;
        }

            .ch-item:hover {
                background: var(--bg-hover);
            }

            .ch-item.active {
                background: var(--bg-active);
                border-color: var(--border-light);
            }

                .ch-item.active::before {
                    content: '';
                    position: absolute;
                    left: 0;
                    top: 50%;
                    transform: translateY(-50%);
                    width: 3px;
                    height: 18px;
                    background: var(--accent);
                    border-radius: 0 2px 2px 0;
                }

        .ch-ava {
            width: 36px;
            height: 36px;
            background: var(--metal-1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .ch-info {
            flex: 1;
            min-width: 0;
        }

        .ch-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-id {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 0.3px;
            margin-top: 1px;
        }

        .ch-acts {
            display: flex;
            gap: 1px;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .ch-item:hover .ch-acts {
            opacity: 1;
        }

        .ch-act-btn {
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.1s;
        }

            .ch-act-btn:hover {
                background: var(--metal-2);
                color: var(--text-primary);
            }

            .ch-act-btn.del:hover {
                color: var(--danger);
                background: var(--danger-dim);
            }

        /* ==================== CHAT ==================== */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.12;
            font-family: 'Space Grotesk', sans-serif;
        }

        .empty-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .empty-sub {
            font-size: 12px;
            opacity: 0.5;
        }

        .chat-hdr {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            min-height: 56px;
            flex-shrink: 0;
        }

        .back-btn {
            display: none;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--metal-1);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

            .back-btn:hover {
                color: var(--text-primary);
            }

        .chat-hdr-ava {
            width: 32px;
            height: 32px;
            background: var(--metal-1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-hdr-info {
            flex: 1;
            min-width: 0;
        }

        .chat-hdr-name {
            font-size: 14px;
            font-weight: 600;
        }

        .chat-hdr-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 0.3px;
        }

        /* ==================== MESSAGES ==================== */
        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
        }

        .date-sep {
            text-align: center;
            margin: 14px 0 10px;
        }

            .date-sep span {
                background: var(--metal-1);
                border: 1px solid var(--border);
                padding: 3px 12px;
                border-radius: 12px;
                font-size: 10px;
                color: var(--text-muted);
                font-family: 'Space Grotesk', sans-serif;
                letter-spacing: 0.5px;
                text-transform: uppercase;
            }

        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 10px;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 3px;
            margin-left: 2px;
            letter-spacing: 0.2px;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            animation: msg-in 0.15s ease;
        }

            .msg-row.mine {
                justify-content: flex-end;
            }

        @keyframes msg-in {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bubble {
            max-width: min(400px, 65%);
            width: fit-content;
            padding: 8px 11px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg-row.other .msg-bubble {
            background: var(--metal-1);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-row.mine .msg-bubble {
            background: var(--metal-2);
            border: 1px solid var(--metal-3);
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px;
            justify-content: flex-end;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Space Grotesk', monospace;
        }

        .msg-edited {
            font-size: 9px;
            color: var(--text-muted);
            font-style: italic;
        }

        .msg-acts {
            display: flex;
            gap: 1px;
            opacity: 0;
            transition: opacity 0.1s;
            flex-shrink: 0;
        }

        .msg-row:hover .msg-acts {
            opacity: 1;
        }

        .msg-act {
            width: 22px;
            height: 22px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.1s;
        }

            .msg-act:hover {
                background: var(--metal-2);
                color: var(--text-primary);
            }

            .msg-act.del:hover {
                color: var(--danger);
            }

        /* ==================== INPUT ==================== */
        .input-area {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .edit-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 7px 12px;
            margin-bottom: 8px;
            background: var(--metal-1);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

            .edit-bar.show {
                display: flex;
            }

        .edit-bar-x {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            border-radius: 4px;
        }

            .edit-bar-x:hover {
                color: var(--text-primary);
            }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .msg-input {
            flex: 1;
            padding: 9px 13px;
            background: var(--metal-1);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            resize: none;
            height: 38px;
            max-height: 140px;
            line-height: 1.4;
            transition: border-color 0.15s;
        }

            .msg-input:focus {
                border-color: var(--metal-3);
            }

        .send-btn {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

            .send-btn:hover {
                background: #ccc;
            }

            .send-btn:active {
                transform: scale(0.93);
            }

            .send-btn svg {
                width: 16px;
                height: 16px;
                fill: var(--bg-primary);
            }

        /* ==================== MODAL ==================== */
        .modal-ov {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

            .modal-ov.show {
                display: flex;
            }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px var(--shadow);
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .modal-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--metal-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            margin-bottom: 18px;
        }

            .modal-input:focus {
                border-color: var(--metal-3);
            }

        .modal-btns {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .m-btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--border);
            letter-spacing: 0.3px;
        }

            .m-btn.cancel {
                background: transparent;
                color: var(--text-secondary);
            }

                .m-btn.cancel:hover {
                    background: var(--metal-1);
                }

            .m-btn.ok {
                background: var(--accent);
                color: var(--bg-primary);
                border-color: var(--accent);
            }

                .m-btn.ok:hover {
                    background: #ccc;
                }

            .m-btn.danger {
                background: var(--danger);
                color: #fff;
                border-color: var(--danger);
            }

                .m-btn.danger:hover {
                    background: #cc2f26;
                }

        /* ==================== TOAST ==================== */
        .toast-box {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .toast {
            padding: 8px 16px;
            background: var(--metal-2);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-primary);
            box-shadow: 0 6px 24px var(--shadow);
            animation: tin 0.2s ease, tout 0.2s ease 2.7s forwards;
            font-family: 'Inter', sans-serif;
        }

            .toast.err {
                border-color: var(--danger);
                color: var(--danger);
            }

        @keyframes tin {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes tout {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(30px);
            }
        }

        ::placeholder {
            color: var(--text-muted);
        }

        /* ==================== MOBILE ==================== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 100%;
                min-width: unset;
                z-index: 20;
                transition: transform 0.2s ease;
            }

                .sidebar.off {
                    transform: translateX(-100%);
                }

            .back-btn {
                display: flex;
            }

            .msg-bubble {
                max-width: min(320px, 78%);
            }

            .ch-acts {
                opacity: 1;
            }

            .msg-acts {
                opacity: 0.7;
            }

            .msgs {
                padding: 12px;
            }

            .input-area {
                padding: 10px 12px 14px;
            }

            .chat-hdr {
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">
                <div class="login-logo-dot"></div>
                <div class="login-logo-text">VOID</div>
            </div>
            <div class="login-subtitle">Sign in to continue</div>

            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('login')">Sign In</button>
                <button class="login-tab" onclick="switchTab('register')">Register</button>
            </div>

            <form id="authForm" onsubmit="doAuth(event)">
                <div class="login-field">
                    <label>Username</label>
                    <input type="text" id="authName" class="login-input" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="login-field">
                    <label>Password</label>
                    <input type="password" id="authPass" class="login-input" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="authBtn">SIGN IN</button>
                <div class="login-error" id="authErr"></div>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div id="appScreen">
        <div class="app-wrap">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-top">
                        <div class="logo"><div class="logo-dot"></div>VOID</div>
                        <div style="position:relative;">
                            <button class="user-btn" id="userBtn" onclick="toggleDrop()"></button>
                            <div class="user-drop" id="userDrop">
                                <div class="user-drop-name" id="dropName"></div>
                                <button class="user-drop-item danger" onclick="doLogout()">⏻ Sign Out</button>
                            </div>
                        </div>
                    </div>
                    <button class="btn-new-ch" onclick="showNewCh()">
                        <span class="p-icon">+</span> New Channel
                    </button>
                </div>
                <div class="ch-list" id="chList"></div>
            </div>

            <div class="chat" id="chat">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">◉</div>
                    <div class="empty-title">VOID</div>
                    <div class="empty-sub">Select a channel to begin</div>
                </div>

                <div id="chatView" style="display:none;flex-direction:column;height:100%;">
                    <div class="chat-hdr">
                        <button class="back-btn" onclick="goBack()">←</button>
                        <div class="chat-hdr-ava" id="cAva"></div>
                        <div class="chat-hdr-info">
                            <div class="chat-hdr-name" id="cName"></div>
                            <div class="chat-hdr-sub" id="cSub"></div>
                        </div>
                    </div>

                    <div class="msgs" id="msgsBox"></div>

                    <div class="input-area">
                        <div class="edit-bar" id="editBar">
                            <span>✎ EDITING</span>
                            <button class="edit-bar-x" onclick="cancelEdit()">✕</button>
                        </div>
                        <div class="input-row">
                            <textarea class="msg-input" id="msgInput" placeholder="Message..." rows="1"></textarea>
                            <button class="send-btn" onclick="sendMsg()">
                                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-ov" id="modalOv">
        <div class="modal" id="modalBox"></div>
    </div>

    <div class="toast-box" id="toastBox"></div>

    <script>
        const API = window.location.origin + '/a';

        let user = null;
        let authMode = 'login';
        let channels = [];
        let activeCh = null;
        let msgs = [];
        let msgsHash = '';
        let editMsgId = null;
        let pollCh = null;
        let pollMsg = null;

        // ===================== AUTH =====================
        function switchTab(m) {
            authMode = m;
            document.querySelectorAll('.login-tab').forEach((t, i) => {
                t.classList.toggle('active', (m === 'login' && i === 0) || (m === 'register' && i === 1));
            });
            document.getElementById('authBtn').textContent = m === 'login' ? 'SIGN IN' : 'REGISTER';
            document.getElementById('authErr').textContent = '';
        }

        async function doAuth(e) {
            e.preventDefault();
            const name = document.getElementById('authName').value.trim();
            const pass = document.getElementById('authPass').value;
            const err = document.getElementById('authErr');
            const btn = document.getElementById('authBtn');

            if (!name || !pass) { err.textContent = 'Fill in all fields'; return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-s"></span>';
            err.textContent = '';

            try {
                if (authMode === 'register') {
                    const r = await fetch(`${API}/Auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, password: pass })
                    });
                    if (!r.ok) {
                        err.textContent = 'Registration failed';
                        btn.disabled = false; btn.textContent = 'REGISTER'; return;
                    }
                }

                const r = await fetch(`${API}/Auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password: pass })
                });

                if (!r.ok) {
                    err.textContent = 'Invalid credentials';
                    btn.disabled = false;
                    btn.textContent = authMode === 'login' ? 'SIGN IN' : 'REGISTER';
                    return;
                }

                user = name;
                localStorage.setItem('void_u', name);
                enterApp();
            } catch (ex) {
                err.textContent = 'Connection error';
                btn.disabled = false;
                btn.textContent = authMode === 'login' ? 'SIGN IN' : 'REGISTER';
            }
        }

        function enterApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('userBtn').textContent = user.charAt(0).toUpperCase();
            document.getElementById('dropName').textContent = '● ' + user;
            loadCh();
            pollCh = setInterval(loadCh, 2000);
        }

        function doLogout() {
            user = null; activeCh = null; channels = []; msgs = [];
            localStorage.removeItem('void_u');
            if (pollCh) clearInterval(pollCh);
            if (pollMsg) clearInterval(pollMsg);
            closeDrop();
            window.location.reload();
        }

        // auto-check session
        (async () => {
            try {
                const r = await fetch(`${API}/channels`);
                if (r.ok) {
                    const s = localStorage.getItem('void_u');
                    if (s) { user = s; enterApp(); return; }
                }
            } catch (e) { }
            document.getElementById('loginScreen').style.display = 'flex';
        })();

        // ===================== USER MENU =====================
        function toggleDrop() { document.getElementById('userDrop').classList.toggle('show'); }
        function closeDrop() { document.getElementById('userDrop').classList.remove('show'); }

        document.addEventListener('click', e => {
            if (!e.target.closest('.user-btn') && !e.target.closest('.user-drop')) closeDrop();
        });

        // ===================== API =====================
        async function api(url, method = 'GET', body = null) {
            const o = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) o.body = JSON.stringify(body);
            const r = await fetch(url, o);
            if (r.status === 401) {
                toast('Session expired', true);
                document.getElementById('appScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                if (pollCh) clearInterval(pollCh);
                if (pollMsg) clearInterval(pollMsg);
                throw new Error('401');
            }
            if (!r.ok) throw new Error(r.status);
            const t = await r.text();
            return t ? JSON.parse(t) : null;
        }

        // ===================== CHANNELS =====================
        async function loadCh() {
            try {
                channels = await api(`${API}/channels`);
                renderCh();
            } catch (e) { if (e.message !== '401') console.error(e); }
        }

        function renderCh() {
            const el = document.getElementById('chList');
            const ids = new Set(channels.map(c => c.channelId));
            if (activeCh && !ids.has(activeCh)) { activeCh = null; showEmpty(); }

            if (!channels.length) {
                el.innerHTML = `<div class="empty-state" style="padding:30px 16px;">
                <div class="empty-icon" style="font-size:28px;">◌</div>
                <div class="empty-sub" style="margin-top:6px;">No channels yet</div>
            </div>`;
                return;
            }

            el.innerHTML = channels.map(c => {
                const sn = esc(c.channelName);
                return `<div class="ch-item ${c.channelId === activeCh ? 'active' : ''}" onclick="selCh('${c.channelId}')">
                <div class="ch-ava">${c.channelName.charAt(0).toUpperCase()}</div>
                <div class="ch-info">
                    <div class="ch-name">${esc(c.channelName)}</div>
                    <div class="ch-id">${c.channelId.substring(0, 8)}</div>
                </div>
                <div class="ch-acts" onclick="event.stopPropagation()">
                    <button class="ch-act-btn" onclick="showEditCh('${c.channelId}','${sn}')" title="Edit">✎</button>
                    <button class="ch-act-btn del" onclick="showDelCh('${c.channelId}','${sn}')" title="Delete">✕</button>
                </div>
            </div>`;
            }).join('');
        }

        async function selCh(id) {
            activeCh = id;
            msgs = [];
            msgsHash = '';
            editMsgId = null;

            const ch = channels.find(c => c.channelId === id);
            const nm = ch ? ch.channelName : '...';

            renderCh();
            showChat(nm);
            document.getElementById('editBar').classList.remove('show');
            document.getElementById('msgsBox').innerHTML = '';

            await loadMsgs();
            scrollEnd();

            if (pollMsg) clearInterval(pollMsg);
            pollMsg = setInterval(loadMsgs, 2000);

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('off');
            }
        }

        function goBack() {
            document.getElementById('sidebar').classList.remove('off');
            activeCh = null;
            showEmpty();
            renderCh();
            if (pollMsg) { clearInterval(pollMsg); pollMsg = null; }
        }

        function showEmpty() {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('chatView').style.display = 'none';
        }

        function showChat(nm) {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('cAva').textContent = nm.charAt(0).toUpperCase();
            document.getElementById('cName').textContent = nm;
            document.getElementById('cSub').textContent = activeCh ? activeCh.substring(0, 16) + '…' : '';
            document.getElementById('msgInput').focus();
        }

        // ===================== MESSAGES =====================
        async function loadMsgs() {
            if (!activeCh) return;
            try {
                const d = await api(`${API}/channels/${activeCh}/messages`);
                const arr = Array.isArray(d) ? d : (d && d.messages ? d.messages : []);
                const h = JSON.stringify(arr);
                if (h !== msgsHash) {
                    const atBot = isBot();
                    msgs = arr;
                    msgsHash = h;
                    renderMsgs();
                    if (atBot) scrollEnd();
                }
            } catch (e) { if (e.message !== '401') console.error(e); }
        }

        function isBot() {
            const c = document.getElementById('msgsBox');
            return c.scrollHeight - c.scrollTop - c.clientHeight < 40;
        }

        function scrollEnd() {
            const c = document.getElementById('msgsBox');
            requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
        }

        function renderMsgs() {
            const box = document.getElementById('msgsBox');

            if (!msgs.length) {
                box.innerHTML = `<div class="empty-state" style="flex:1;">
                <div class="empty-icon" style="font-size:28px;">◌</div>
                <div class="empty-sub" style="margin-top:6px;">No messages yet</div>
            </div>`;
                return;
            }

            let html = '';
            let lastSender = null;
            let lastDate = '';

            msgs.forEach(m => {
                const sender = m.senderName || m.userName || m.authorName || '?';
                const mine = sender === user;
                const side = mine ? 'mine' : 'other';
                const txt = m.text || m.content || m.body || '';
                const mid = m.messageId || m.id;
                const edited = m.isEdited || m.edited || false;

                const dt = parseD(m.sentAt || m.createdAt || m.timestamp);
                const ds = fmtDate(dt);
                const ts = fmtTime(dt);

                if (ds !== lastDate) {
                    if (lastSender !== null) html += '</div>';
                    html += `<div class="date-sep"><span>${ds}</span></div>`;
                    lastDate = ds;
                    lastSender = null;
                }

                if (sender !== lastSender) {
                    if (lastSender !== null) html += '</div>';
                    html += '<div class="msg-group">';
                    if (!mine) html += `<div class="msg-sender">${esc(sender)}</div>`;
                    lastSender = sender;
                }

                const acts = mine ? `<div class="msg-acts">
                <button class="msg-act" onclick="startEdit('${esca(mid)}')" title="Edit">✎</button>
                <button class="msg-act del" onclick="showDelMsg('${esca(mid)}')" title="Delete">✕</button>
            </div>` : '';

                html += `<div class="msg-row ${side}">
                ${mine ? acts : ''}
                <div class="msg-bubble">${esc(txt)}<div class="msg-meta">
                    ${edited ? '<span class="msg-edited">edited</span>' : ''}
                    <span class="msg-time">${ts}</span>
                </div></div>
                ${!mine ? acts : ''}
            </div>`;
            });

            if (lastSender !== null) html += '</div>';
            box.innerHTML = html;
        }

        async function sendMsg() {
            const inp = document.getElementById('msgInput');
            const txt = inp.value;
            if (!txt.trim() || !activeCh) return;

            try {
                if (editMsgId) {
                    await api(`${API}/channels/${activeCh}/messages/${editMsgId}`, 'PUT', { text: txt });
                    cancelEdit();
                } else {
                    await api(`${API}/channels/${activeCh}/messages`, 'POST', { text: txt });
                }
                inp.value = '';
                inp.style.height = '38px';
                await loadMsgs();
                scrollEnd();
            } catch (e) { if (e.message !== '401') toast('Send failed', true); }
        }

        function startEdit(mid) {
            const m = msgs.find(x => (x.messageId || x.id) === mid);
            if (!m) return;
            editMsgId = mid;
            const inp = document.getElementById('msgInput');
            inp.value = m.text || m.content || m.body || '';
            inp.focus();
            inp.style.height = 'auto';
            inp.style.height = Math.min(inp.scrollHeight, 140) + 'px';
            document.getElementById('editBar').classList.add('show');
        }

        function cancelEdit() {
            editMsgId = null;
            const inp = document.getElementById('msgInput');
            inp.value = '';
            inp.style.height = '38px';
            document.getElementById('editBar').classList.remove('show');
        }

        // ===================== CHANNEL MODALS =====================
        function showNewCh() {
            openModal(`<div class="modal-title">New Channel</div>
            <input class="modal-input" id="mIn" placeholder="Channel name" autofocus maxlength="64">
            <div class="modal-btns">
                <button class="m-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="m-btn ok" onclick="createCh()">Create</button>
            </div>`);
            setTimeout(() => {
                const i = document.getElementById('mIn');
                if (i) { i.focus(); i.onkeydown = e => { if (e.key === 'Enter') createCh(); }; }
            }, 50);
        }

        async function createCh() {
            const n = document.getElementById('mIn').value.trim();
            if (!n) return;
            try {
                await api(`${API}/channels`, 'POST', { name: n, channelName: n });
                closeModal(); toast('Channel created');
                await loadCh();
            } catch (e) { if (e.message !== '401') toast('Failed', true); }
        }

        function showEditCh(id, name) {
            openModal(`<div class="modal-title">Edit Channel</div>
            <input class="modal-input" id="mIn" value="${name}" autofocus maxlength="64">
            <div class="modal-btns">
                <button class="m-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="m-btn ok" onclick="editCh('${id}')">Save</button>
            </div>`);
            setTimeout(() => {
                const i = document.getElementById('mIn');
                if (i) { i.focus(); i.select(); i.onkeydown = e => { if (e.key === 'Enter') editCh(id); }; }
            }, 50);
        }

        async function editCh(id) {
            const n = document.getElementById('mIn').value.trim();
            if (!n) return;
            try {
                await api(`${API}/channels/${id}`, 'PUT', { name: n, channelName: n });
                closeModal(); toast('Updated');
                await loadCh();
                if (id === activeCh) {
                    document.getElementById('cName').textContent = n;
                    document.getElementById('cAva').textContent = n.charAt(0).toUpperCase();
                }
            } catch (e) { if (e.message !== '401') toast('Failed', true); }
        }

        function showDelCh(id, name) {
            openModal(`<div class="modal-title">Delete Channel</div>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:18px;line-height:1.5;">
            Delete <strong style="color:var(--text-primary)">"${name}"</strong>? This cannot be undone.</p>
            <div class="modal-btns">
                <button class="m-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="m-btn danger" onclick="delCh('${id}')">Delete</button>
            </div>`);
        }

        async function delCh(id) {
            try {
                await api(`${API}/channels/${id}`, 'DELETE');
                closeModal(); toast('Deleted');
                if (id === activeCh) { activeCh = null; showEmpty(); }
                await loadCh();
            } catch (e) { if (e.message !== '401') toast('Failed', true); }
        }

        function showDelMsg(mid) {
            openModal(`<div class="modal-title">Delete Message</div>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:18px;">Delete this message?</p>
            <div class="modal-btns">
                <button class="m-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="m-btn danger" onclick="delMsg('${esca(mid)}')">Delete</button>
            </div>`);
        }

        async function delMsg(mid) {
            try {
                await api(`${API}/channels/${activeCh}/messages/${mid}`, 'DELETE');
                closeModal(); toast('Deleted');
                await loadMsgs();
            } catch (e) { if (e.message !== '401') toast('Failed', true); }
        }

        // ===================== MODAL =====================
        function openModal(h) {
            document.getElementById('modalBox').innerHTML = h;
            document.getElementById('modalOv').classList.add('show');
        }

        function closeModal() { document.getElementById('modalOv').classList.remove('show'); }

        document.getElementById('modalOv').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ===================== INPUT =====================
        document.addEventListener('DOMContentLoaded', () => {
            const inp = document.getElementById('msgInput');
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
            });
            inp.addEventListener('input', function () {
                this.style.height = '38px';
                this.style.height = Math.min(this.scrollHeight, 140) + 'px';
            });
        });

        // ===================== DATE =====================
        function parseD(v) {
            if (!v) return new Date();
            const d = new Date(v);
            return isNaN(d.getTime()) ? new Date() : d;
        }

        function fmtTime(d) {
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function fmtDate(d) {
            const n = new Date();
            const t = new Date(n.getFullYear(), n.getMonth(), n.getDate());
            const m = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const diff = Math.round((t - m) / (864e5));
            if (diff === 0) return 'Today';
            if (diff === 1) return 'Yesterday';
            const mo = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            if (d.getFullYear() === n.getFullYear()) return `${mo[d.getMonth()]} ${d.getDate()}`;
            return `${mo[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        }

        // ===================== UTILS =====================
        function toast(m, err = false) {
            const c = document.getElementById('toastBox');
            const el = document.createElement('div');
            el.className = 'toast' + (err ? ' err' : '');
            el.textContent = m;
            c.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function esc(s) {
            if (!s) return '';
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function esca(s) {
            if (!s) return '';
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/\n/g, '&#10;').replace(/\r/g, '&#13;');
        }
    </script>

</body>
</html>
